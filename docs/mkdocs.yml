site_name: bensemble
site_url: https://intsystems.github.io/bensemble/

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.tabs

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Basic Concepts: user-guide/basic-concepts.md
      - Building Ensembles: user-guide/building-ensembles.md
      - Uncertainty Analysis: user-guide/uncertainty-analysis.md
      - Calibration: user-guide/calibration.md
  - API Reference:
      - Core & Ensemble: api/core.md
      - Layers: api/layers.md
      - Search Algorithms: api/search.md
      - Metrics: api/metrics.md
      - Uncertainty Utils: api/uncertainty.md
  - References: references.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [".."]
          options:
            docstring_style: google
            show_root_heading: true

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js